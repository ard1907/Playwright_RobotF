
name: docker2-tests

services:

  # AusweisApp SDK im Automatic Mode (headless, Developer-Mode, eingebettete Testkarte)
  # Browser navigiert zu http://127.0.0.1:24727/eID-Client?tcTokenURL=...
  # Der SDK authentifiziert vollautomatisch ohne weiteres Python-Skript.
  ausweisapp-sdk:
    build:
      context: ..
      dockerfile: docker2/ausweisapp-sdk.Dockerfile
    ports:
      - "24727:24727"

    restart: "no"
    # restart: unless-stopped

  robot-tests:
    build:
      context: ..
      dockerfile: docker2/robot_tests.Dockerfile
    depends_on:
      - ausweisapp-sdk

    environment:
      - CI=True
      - HEADLESS=True
      - BROWSER=chromium
      # The browser flow still targets 127.0.0.1 in the eID redirect chain.
      # With host networking, that loopback address resolves to the host.
      - AUSWEISAPP_URL=http://127.0.0.1:24727

    network_mode: "host"
    user: root

    # Bind-Mount funktioniert im DooD-Setup NUR, wenn der Runner-Workdir auf dem
    # Host gemountet ist (siehe docker-compose.runner.yml: /tmp/runner/work:/tmp/runner/work).
    # Docker-Daemon (Host) löst '../results2' als absoluten Host-Pfad auf –
    # dieser ist dann identisch mit dem Pfad im Runner-Container → Schreibzugriff für beide.
    volumes:
      - ../results2:/app/results2
