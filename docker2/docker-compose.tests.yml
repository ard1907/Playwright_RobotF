
name: docker2-tests

services:

  # AusweisApp SDK im Automatic Mode (headless, Developer-Mode, eingebettete Testkarte)
  # Browser navigiert zu http://127.0.0.1:24727/eID-Client?tcTokenURL=...
  # Der SDK authentifiziert vollautomatisch ohne weiteres Python-Skript.
  ausweisapp-sdk:
    build:
      context: ..
      dockerfile: docker2/ausweisapp-sdk.Dockerfile
    ports:
      - "24727:24727"

    restart: "no"
    # restart: unless-stopped

  robot-tests:
    build:
      context: ..
      dockerfile: docker2/robot_tests.Dockerfile
    depends_on:
      - ausweisapp-sdk

    environment:
      - CI=True
      - HEADLESS=True
      - BROWSER=chromium
      # The browser flow still targets 127.0.0.1 in the eID redirect chain.
      # With host networking, that loopback address resolves to the host.
      - AUSWEISAPP_URL=http://127.0.0.1:24727

    network_mode: "host"
    user: root

    # HINWEIS: Der Bind-Mount schreibt in den Docker Desktop Moby-VM-Pfad, NICHT in den
    # Runner-Container und nicht in den Windows-Workspace. Daher ist er hier deaktiviert.
    # Die Ergebnisse werden im Workflow per 'docker cp' aus dem Container geholt.
    # volumes:
    #   - ../results2:/app/results2
