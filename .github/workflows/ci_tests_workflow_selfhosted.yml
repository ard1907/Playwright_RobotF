name: Robot Framework (Self-hosted)
# Self-hosted Runner (als Container) und Ausweisapp-sdk (als Container) und 
# Robot Framework Tests (als Container) auf demselben Host, Kommunikation über localhost
# Voraussetzung: docker-compose.runner.yml bindet /tmp/runner/work als Volume ein (DooD-Fix).
# Ergebnisse landen via Bind-Mount direkt in results2 (HOST+Runner-Container identischer Pfad).
on:
  push:
    branches:
      - main
      - develop
      - 'feature/**'
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: [self-hosted, linux]

    env:
      COMPOSE_BAKE: true

    defaults:
      run:
        shell: bash

    steps:
      # 1️⃣ Repository auschecken
      - name: Checkout
        uses: actions/checkout@v4

      # 2️⃣ Optional: Prüfen, dass wir im Repository-Root-Verzeichnis sind
      - name: Set working directory
        run: echo "WORKSPACE=${{ github.workspace }}"  # optional, zur Kontrolle

      # 2️⃣b Ergebnisordner sicher anlegen und alte Resultate entfernen
      - name: Prepare results directory
        run: mkdir -p ${{ github.workspace }}/results2

      - name: Clean previous results
        run: find ${{ github.workspace }}/results2 -mindepth 1 -maxdepth 1 -exec rm -rf {} +

      # 3️⃣ Alte Container-Reste entfernen, damit keine Namens- oder Portkonflikte bleiben
      - name: Cleanup legacy containers
        run: |
          docker rm -f ausweisapp-sdk-v2 robot-tests-v2 >/dev/null 2>&1 || true

      # 4️⃣ Nur den AusweisApp-Container starten
      - name: Start AusweisApp
        run: |
          docker compose -f ${{ github.workspace }}/docker2/docker-compose.tests.yml up -d --build --remove-orphans ausweisapp-sdk

      # 5️⃣ Robot Framework Tests im Docker-Container ausführen
      - name: Run Tests in Docker
        run: |
          docker compose -f ${{ github.workspace }}/docker2/docker-compose.tests.yml up --build --remove-orphans --abort-on-container-exit --exit-code-from robot-tests robot-tests

      # 5️⃣b Ergebnisse per 'docker cp' als Backup sichern, falls der Bind-Mount unerwartet
      # nicht greift (z. B. beim ersten Lauf vor dem Workdir-Mount-Warmup).
      - name: Copy test results from container (Backup)
        if: always()
        run: |
          container_id=$(docker compose -f ${{ github.workspace }}/docker2/docker-compose.tests.yml ps -aq robot-tests)
          if [ -n "$container_id" ]; then
            echo "Sicherungs-Copy aus Container $container_id ..."
            docker cp "$container_id":/app/results2/. ${{ github.workspace }}/results2/ || \
              echo "Hinweis: docker cp nicht nötig – Bind-Mount hat bereits kopiert."
          else
            echo "Warnung: Container 'robot-tests' nicht gefunden."
          fi

      # 6️⃣ Container stoppen, auch wenn Tests fehlschlagen
      - name: Stop AusweisApp
        if: always()
        run: |
          docker compose -f ${{ github.workspace }}/docker2/docker-compose.tests.yml down --remove-orphans

      # 7️⃣ Testergebnisse hochladen
      - name: Upload Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: robot-test-results-selfhosted
          path: |
            results2/log.html
            results2/output.xml
            results2/report.html
            results2/xunit.xml