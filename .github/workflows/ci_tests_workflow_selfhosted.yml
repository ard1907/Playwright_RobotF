name: Robot Framework (Self-hosted)
# Self-hosted Runner (als Container) und Ausweisapp-sdk (als Container) und 
# Robot Framework Tests (als Container) auf demselben Host, Kommunikation über localhost
on:
  push:
    branches:
      - main
      - develop
      - 'feature/**'
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: [self-hosted, linux]

    defaults:
      run:
        shell: bash

    steps:
      # 1️⃣ Repository auschecken
      - name: Checkout
        uses: actions/checkout@v4

      # 2️⃣ Optional: Prüfen, dass wir im Repository-Root-Verzeichnis sind
      - name: Set working directory
        run: echo "WORKSPACE=${{ github.workspace }}"  # optional, zur Kontrolle

      # 3️⃣ Nur den AusweisApp-Container starten
      - name: Start AusweisApp
        run: |
          docker compose -f ${{ github.workspace }}/docker2/docker-compose.tests.yml up -d --build ausweisapp-sdk

      # 4️⃣ Robot Framework Tests im Docker-Container ausführen
      - name: Run Tests in Docker
        run: |
          docker compose -f ${{ github.workspace }}/docker2/docker-compose.tests.yml up --build --abort-on-container-exit --exit-code-from robot-tests robot-tests

      # 5️⃣ Container stoppen, auch wenn Tests fehlschlagen
      - name: Stop AusweisApp
        if: always()
        run: |
          docker compose -f ${{ github.workspace }}/docker2/docker-compose.tests.yml down

      # 6️⃣ Testergebnisse hochladen
      - name: Upload Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: results2
          path: |
            results2/log.html
            results2/output.xml
            results2/report.html
            results2/xunit.xml