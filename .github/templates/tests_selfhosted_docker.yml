name: Robot Framework Tests (Self-Hosted)

on:
  push:
    branches:
      - main
      - develop
      - 'feature/**'
  # pull_request:         #ARD: Vorsicht, Sicherheitsrisiko bei öffentlichen Repos und "self-hosted" Runnern !!!
  #   branches:
  #     - main
  #     - develop
  schedule:
    # Run tests daily at 9 AM UTC (only on main)
    - cron: '0 9 * * *'
  workflow_dispatch:                # allow manual run from GitHub UI

jobs:
  test:
    runs-on: self-hosted            # <-- wichtig: Self-Hosted Runner
    container: ubuntu:22.04         # optional, falls Runner direkt Ubuntu nutzt
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 1. Starte AusweisApp SDK mit Docker Compose ──────────────
      - name: Start AusweisApp SDK
        run: docker-compose -f docker/docker-compose.runner.yml up -d

      # ── 2. Starte Robot-Tests Container ─────────────────────────
      - name: Run Robot Framework Tests
        run: |
          docker-compose run --rm robot-tests bash -c "
          apt-get update && apt-get install -y python3-pip curl git
          pip3 install --upgrade pip
          pip3 install -r requirements.txt
          rfbrowser init
          npx playwright install --with-deps chromium
          robot \
            --variable CI:True \
            --variable HEADLESS:True \
            --variable BASE_URL:https://datenschutzcockpit.dsc.govkg.de/spa/ \
            --variable BROWSER:chromium \
            --outputdir results \
            --report results/report.html \
            --log results/log.html \
            --xunit results/xunit.xml \
            tests/
          "

      # ── 3. Test-Ergebnisse sichern ───────────────────────────────
      # Use @v4 — v3 is deprecated and shows a warning in every run.
      - name: Upload Robot Framework results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: robot-test-results
          path: results/
          retention-days: 30

