name: Robot Framework Tests (Self-hosted + local VPN)

# ── Triggers ──────────────────────────────────────────────────────────────────
# Runs on every push/PR to main, develop, or any feature branch that touches
# test files or the workflow itself.
on:
  push:
    branches:
      - main
      - develop
      - 'feature/**'
  pull_request:
    branches:
      - main
      - develop
  schedule:
    # Run tests daily at 9 AM UTC (only on main)
    - cron: '0 9 * * *'
  workflow_dispatch:                # allow manual run from GitHub UI

# ── Jobs ──────────────────────────────────────────────────────────────────────
jobs:
  test:
    # Ubuntu is faster, cheaper, and better supported than windows-latest.
    # The Browser Library runs headless Chromium, so the OS does not matter
    # for these tests (the target is a remote website, not localhost).
    runs-on: self-hosted

    steps:
      # ── 1. Get the source code ─────────────────────────────────────────────
      # ── 1. Repo auschecken ─────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # 🐳 Docker starten (AusweisApp)
      # ── 2. Docker AusweisApp starten ───────────────────────────────────
      - name: Start AusweisApp via Docker Compose
        # run: docker-compose down
        run: docker-compose up -d

      # ⏳ Warten bis Service läuft
      # ── 3. Warten bis AusweisApp bereit ist (Bash, Windows) ─────
      - name: Wait for AusweisApp
        run: |
          echo "Waiting for AusweisApp..."
          timeout 60 bash -c 'until curl -f http://127.0.0.1:24727/eID-Client; do sleep 2; done'

      # # ── 3. Warten bis AusweisApp bereit ist (PowerShell, Windows) ─────
      # - name: Wait for AusweisApp
      #   shell: powershell
      #   run: |
      #     Write-Host "Waiting for AusweisApp..."
      #     $timeout = 60
      #     $elapsed = 0
      #     while ($elapsed -lt $timeout) {
      #         try {
      #             Invoke-WebRequest -Uri http://127.0.0.1:24727/eID-Client -UseBasicParsing
      #             Write-Host "AusweisApp ready"
      #             break
      #         } catch {
      #             Start-Sleep -Seconds 2
      #             $elapsed += 2
      #         }
      #     }


      # ── 2. Set up Python 3.11 ─────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # ── 3. Cache pip packages ─────────────────────────────────────────────
      # This saves ~2-4 minutes on every run after the first one.
      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      # ── 4. Install Python dependencies ────────────────────────────────────
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ── 5. Initialize Robot Framework Browser Library ─────────────────────
      # THIS IS THE MOST CRITICAL STEP.
      #
      # robotframework-browser ships its own Node.js + Playwright binaries.
      # "rfbrowser init" downloads and installs them.
      # This is COMPLETELY SEPARATE from "python -m playwright install".
      # Without this step, the Browser Library cannot open any browser at all.
      - name: Initialize RF Browser Library (rfbrowser init)
        run: rfbrowser init

      # ── 6. Install system dependencies for Chromium on Ubuntu ─────────────
      # ARD: Punkt 6 könnte NICHT nötig sein, da Punkt 5. dies eigentlich alles schon macht
      # Ubuntu runners are minimal. Chromium needs several shared libraries.
      # playwright install --with-deps handles this automatically.
      - name: Install Chromium system dependencies
        run: npx playwright install --with-deps chromium

      # ── 7. Run all tests (headless + CI mode) ─────────────────────────────
      # --variable CI:True      → uses the IF ${CI} branch in setup_teardown.robot
      # --variable HEADLESS:True → forces headless mode (no physical screen in CI)
      # --outputdir results      → all Robot output goes to the results/ folder
      - name: Run Robot Framework tests
        run: |
          robot ^
            --variable CI:True ^
            --variable HEADLESS:True ^
            --variable BASE_URL:https://datenschutzcockpit.dsc.govkg.de/spa/ ^
            --variable BROWSER:chromium ^
            --outputdir results ^
            --report results/report.html ^
            --log results/log.html ^
            --xunit results/xunit.xml ^
            tests/

      # ── 8. Upload test results (always, even on failure) ──────────────────
      # Use @v4 — v3 is deprecated and shows a warning in every run.
      - name: Upload Robot Framework results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: robot-test-results
          path: results/
          retention-days: 30

      # ── 9. Upload Playwright traces (always) ──────────────────────────────
      - name: Upload Playwright traces
        uses: actions/upload-artifact@v4
        if: always() && hashFiles('browser/traces/**') != ''
        with:
          name: playwright-traces
          path: browser/traces/
          retention-days: 7

      # ── 10. Comment on PR with a test summary ────────────────────────────
      - name: Comment on PR with test summary
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '## Robot Framework Test Results\n\nTests have finished. Download the **robot-test-results** artifact above to view `report.html` and `log.html`.'
            });
